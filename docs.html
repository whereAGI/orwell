<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/static/logo.png" />
  <title>Orwell Documentation</title>
  <meta name="description" content="Documentation for Orwell — the open framework for auditing the behavioral tendencies of AI models." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ── NOTION-LIKE LIGHT THEME ── */
    :root {
      --bg: #ffffff;
      --bg-2: #f7f6f3;
      --bg-3: #f0efe9;
      --bg-card: #ffffff;
      --border: #e9e9e7;
      --border-light: #f3f3f2;
      --accent: #0f0f0f;
      --accent-dim: #333333;
      --text: #37352f;
      --text-2: #787774;
      --text-3: #9e9c98;
      --green: #0f7b6c;
      --yellow: #d9a341;
      --red: #eb5757;
      --radius: 6px;
      --radius-lg: 10px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      height: 56px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo img { height: 24px; width: auto; border-radius: 4px; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a {
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-cta {
      background: var(--text);
      color: #fff !important;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-weight: 500 !important;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--text-2) !important; }

    /* ── DOCS LAYOUT ── */
    .docs-container {
      display: flex;
      flex: 1;
      margin-top: 56px; /* offset for nav */
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      padding: 32px 24px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-category {
      margin-bottom: 24px;
    }
    .sidebar-category-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      padding-left: 8px;
    }
    .sidebar-link {
      display: block;
      padding: 6px 8px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .sidebar-link:hover {
      background: rgba(0,0,0,0.04);
      color: var(--text);
    }
    .sidebar-link.active {
      background: rgba(0,0,0,0.06);
      color: var(--text);
      font-weight: 600;
    }

    /* ── MAIN CONTENT ── */
    .content-area {
      flex: 1;
      padding: 48px 60px;
      overflow-y: auto;
      background: var(--bg);
    }
    .content-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── MARKDOWN STYLES (Notion-like) ── */
    .markdown-body h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 32px;
      color: var(--text);
    }
    .markdown-body h2 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 40px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .markdown-body h3 {
      font-size: 18px;
      font-weight: 600;
      margin-top: 32px;
      margin-bottom: 12px;
      color: var(--text);
    }
    .markdown-body p {
      font-size: 16px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .markdown-body a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: #d9d9d7;
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s;
    }
    .markdown-body a:hover {
      text-decoration-color: var(--text);
    }
    .markdown-body ul, .markdown-body ol {
      margin-bottom: 16px;
      padding-left: 24px;
      color: var(--text);
      line-height: 1.6;
    }
    .markdown-body li {
      margin-bottom: 8px;
    }
    .markdown-body strong {
      font-weight: 600;
    }
    .markdown-body em {
      font-style: italic;
      color: var(--text-2);
    }
    .markdown-body hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .markdown-body blockquote {
      border-left: 3px solid var(--text);
      padding-left: 16px;
      margin: 24px 0;
      font-size: 18px;
      color: var(--text);
      font-style: italic;
    }
    .markdown-body code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      color: #eb5757; /* A subtle red similar to Notion inline code */
    }
    .markdown-body pre {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin: 24px 0;
    }
    .markdown-body pre code {
      background: transparent;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 13px;
    }
    .markdown-body img {
      max-width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin: 24px 0;
    }

    /* ── LOADER ── */
    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      color: var(--text-3);
      font-size: 14px;
      font-weight: 500;
    }

    /* ── RESPONSIVE ── */
    .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; color: var(--text); padding: 4px; }
    @media (max-width: 900px) {
      .nav-links { display: none; }
      .mobile-menu-btn { display: block; }
      .sidebar {
        position: fixed;
        top: 56px;
        left: -100%;
        bottom: 0;
        z-index: 90;
        transition: left 0.3s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,0.05);
      }
      .sidebar.open { left: 0; }
      .content-area { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div style="display: flex; align-items: center; gap: 16px;">
    <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="Toggle Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="index.html" class="nav-logo">
      <img src="https://raw.githubusercontent.com/whereAGI/orwell/main/static/logo.png" alt="Orwell" onerror="this.style.display='none'" />
      Orwell
    </a>
  </div>
  <div class="nav-links">
    <a href="index.html#setup">Setup</a>
    <a href="index.html#features">Features</a>
    <a href="index.html#use-cases">Use Cases</a>
    <a href="docs.html" class="active">Docs</a>
    <a href="https://github.com/whereAGI/orwell" target="_blank">GitHub</a>
    <a href="https://calendly.com/pratheek-asmlabs/new-meeting" target="_blank" class="nav-cta">Book a Demo</a>
  </div>
</nav>

<!-- ── DOCS LAYOUT ── -->
<div class="docs-container">
  
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-category">
      <div class="sidebar-category-title">Getting Started</div>
      <a class="sidebar-link" onclick="loadDoc('Introduction(Getting Started_1)_1.md', this)">Introduction</a>
      <a class="sidebar-link" onclick="loadDoc('Installation(Getting Started_1)_2.md', this)">Installation</a>
    </div>

    <div class="sidebar-category">
      <div class="sidebar-category-title">Usage</div>
      <a class="sidebar-link" onclick="loadDoc('Configuration(Usage_3)_1.md', this)">Configuration</a>
      <a class="sidebar-link" onclick="loadDoc('Audit(Usage_3)_2.md', this)">Audit</a>
    </div>

    <div class="sidebar-category">
      <div class="sidebar-category-title">Methodology</div>
      <a class="sidebar-link" onclick="loadDoc('Evaluation Criteria(Methodology_4)_1.md', this)">Evaluation Criteria</a>
      <a class="sidebar-link" onclick="loadDoc('Generating New Dimensions(Methodology_4)_2.md', this)">Generating New Dimensions</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content-area">
    <div class="content-inner">
      <div id="markdown-content" class="markdown-body">
        <!-- Content gets injected here -->
        <div class="loader">Loading documentation...</div>
      </div>
    </div>
  </main>
</div>

<script>
  // Setup marked.js options
  marked.setOptions({
    gfm: true,
    breaks: true,
    headerIds: true,
  });

  async function loadDoc(filename, linkElement) {
    const contentDiv = document.getElementById('markdown-content');
    contentDiv.innerHTML = '<div class="loader">Loading...</div>';

    // Update active state in sidebar
    if (linkElement) {
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
      linkElement.classList.add('active');
      
      // Close sidebar on mobile after clicking
      if (window.innerWidth <= 900) {
        document.getElementById('sidebar').classList.remove('open');
      }
    }

    try {
      // Fetch markdown file from docs directory
      const response = await fetch(`docs/${filename}`);
      
      if (!response.ok) {
        throw new Error(`Failed to load document: ${response.statusText}`);
      }
      
      const markdown = await response.text();
      contentDiv.innerHTML = marked.parse(markdown);

      // Scroll to top
      document.querySelector('.content-area').scrollTop = 0;

      // Update URL hash for sharing links without reloading page
      const hashName = filename.split('(')[0].replace(/\s+/g, '-').toLowerCase();
      window.history.replaceState(null, null, `#${hashName}`);

    } catch (error) {
      contentDiv.innerHTML = `
        <div style="text-align:center; padding: 40px; color: var(--red);">
          <h3>Error Loading Document</h3>
          <p>${error.message}</p>
          <p style="font-size: 14px; color: var(--text-2); margin-top: 16px;">Make sure you are serving this site via a local web server (e.g., Python's http.server or VS Code Live Server) so that fetch requests work.</p>
        </div>
      `;
    }
  }

  // Initial load
  window.addEventListener('DOMContentLoaded', () => {
    // Check if there's a hash in the URL to load a specific doc
    const hash = window.location.hash.replace('#', '');
    let defaultDoc = 'Introduction(Getting Started_1)_1.md';
    let defaultLink = document.querySelectorAll('.sidebar-link')[0];

    if (hash) {
      // Try to find matching doc by hash
      const links = Array.from(document.querySelectorAll('.sidebar-link'));
      const targetLink = links.find(link => {
        const onclick = link.getAttribute('onclick');
        const filename = onclick.match(/'(.*?)'/)[1];
        const linkHash = filename.split('(')[0].replace(/\s+/g, '-').toLowerCase();
        return linkHash === hash;
      });

      if (targetLink) {
        const onclick = targetLink.getAttribute('onclick');
        defaultDoc = onclick.match(/'(.*?)'/)[1];
        defaultLink = targetLink;
      }
    }

    loadDoc(defaultDoc, defaultLink);
  });
</script>

</body>
</html>
