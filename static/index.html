<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Orwell Audit</title>
  <style>
    :root {
      --bg: #0b0b0f;
      --card: #121218;
      --muted: #a0a0b8;
      --text: #f5f6f8;
      --primary: #1f6feb;
      --border: #252536;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr 340px;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: #0d0d13;
      padding: 16px;
    }

    .rightbar {
      border-left: 1px solid var(--border);
      background: #0d0d13;
      padding: 16px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin: 0 0 12px;
      color: var(--muted);
    }

    .audit-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .audit-item {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      cursor: pointer;
    }

    .audit-item:hover {
      border-color: #2e2e48;
    }

    .content {
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .pill.selected {
      border-color: var(--primary);
      color: #e5e7eb;
      background: #0e1726;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input,
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0e0e14;
      color: var(--text);
    }

    input:focus {
      outline: none;
      border-color: #2e2e48;
    }

    button {
      background: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
      cursor: pointer;
    }

    .progress {
      width: 100%;
      background: #0f1320;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      width: 0%;
      background: var(--primary);
      color: #fff;
      text-align: center;
      padding: 6px 0;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: #0e1320;
      color: var(--muted);
    }

    .risk {
      padding: 14px;
      border-radius: 8px;
      color: #fff;
    }

    .risk.low {
      background: var(--success);
    }

    .risk.medium {
      background: var(--warning);
    }

    .risk.high {
      background: var(--danger);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .qa-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f0f16;
      margin-bottom: 10px;
    }

    .label {
      font-size: 11px;
      color: var(--muted);
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #11121a;
    }

    .reason {
      padding: 10px;
      border: 1px solid #2e2e48;
      border-radius: 8px;
      background: #101325;
      color: #e5e7eb;
    }
  </style>
</head>

<body>
  <header
    style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:#0d0d13;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--primary);"></div>
      <h1 style="margin:0;font-size:16px;letter-spacing:0.3px;color:#e5e7eb;">orwell <span
          style="color:var(--muted);font-weight:400;">/ playground</span></h1>
    </div>
    <div class="mono" style="color:var(--muted);display:flex;align-items:center;gap:16px;">
      <a href="/studio"
        style="color:var(--text);text-decoration:none;padding:4px 8px;border-radius:4px;background:#1f2937;">Data
        Studio</a>
      <a href="#" id="criteriaLink" style="color:#9ec1ff;text-decoration:none">Evaluation Criteria</a>
    </div>
  </header>
  <div class="app">
    <aside class="sidebar">
      <h2>Previous Audits</h2>
      <div id="auditList" class="audit-list"></div>
      <button id="deleteBtn" style="margin-top:12px;background:var(--danger);border-color:var(--danger)">Delete
        Selected</button>
    </aside>
    <main class="content">
      <div class="card">
        <h3 style="margin:0 0 8px">Prompts & Responses</h3>
        <div id="qaAccordion"></div>
      </div>

      <div class="grid">
        <div class="card" id="report" style="display:none;">
          <h3 style="margin:0 0 8px">Audit Report</h3>
          <div id="reportContent"></div>
        </div>
      </div>
    </main>
    <aside class="rightbar">
      <div class="card">
        <h3 style="margin:0 0 12px">Start Audit</h3>
        <div>
          <label>Select Dimensions</label>
          <div id="dimList" style="display:flex;flex-wrap:wrap;gap:8px"></div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="dimSelectAll" style="background:#1f2937;border-color:#1f2937">Select All</button>
            <button id="dimClear" style="background:#1f2937;border-color:#1f2937">Clear</button>
          </div>
        </div>
        <div>
          <label>Target Endpoint</label>
          <input id="endpoint" type="text" placeholder="https://api.openai.com/v1/chat/completions" />
        </div>
        <div style="margin-top:8px">
          <label>API Key</label>
          <input id="apiKey" type="password" placeholder="sk-... (leave empty to use env)" />
        </div>
        <div style="margin-top:8px">
          <label>Model Name</label>
          <input id="modelName" type="text" placeholder="gpt-4o-mini" />
        </div>
        <div style="margin-top:8px">
          <label>Sample Size</label>
          <input id="sampleSize" type="number" value="20" min="1" max="200" />
        </div>
        <div style="margin-top:8px">
          <label>Language</label>
          <input id="language" type="text" value="en" />
        </div>
        <div style="display:flex;gap:8px;margin-top:12px"><button id="startBtn">Start Audit</button></div>
        <div id="status" style="margin-top:12px;display:none;">
          <div style="display:flex;align-items:center;gap:8px;justify-content:space-between;">
            <div class="pill">Status: <span id="statusText">pending</span></div>
            <div class="mono">Job: <span id="jobIdText">-</span></div>
          </div>
          <div class="progress">
            <div id="progressFill" class="progress-fill">0%</div>
          </div>
          <p id="statusMessage" style="color:var(--muted);"></p>
        </div>
      </div>
    </aside>
  </div>
  <div id="criteriaModal"
    style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6)">
    <div class="card" style="width:640px;max-width:90vw;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h3 style="margin:0">Evaluation Criteria</h3>
        <button id="criteriaClose"
          style="width:auto;padding:6px 10px;background:#1f2937;border-color:#1f2937">Close</button>
      </div>
      <div id="criteria" style="margin-top:10px"></div>
    </div>
  </div>
  <script src="/static/dashboard.js"></script>
</body>

</html>
