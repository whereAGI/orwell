<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <title>Orwell Data Studio</title>
    <link rel="stylesheet" href="/static/global.css">
    <style>
        .badge.custom {
            background: #1f6feb22;
            color: #60a5fa;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
    </style>
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="/static/auth.js"></script>
    <script>
        // Protect route
        if (!pb.authStore.isValid) {
            window.location.href = '/login';
        }
    </script>
</head>

<body>
    <header></header>

    <div class="app-container">
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h2 style="margin:0">Manage Prompts</h2>
                <div style="display:flex; gap:8px;">
                    <button id="bulkDeleteBtn" class="danger" style="width: auto; display: none;" onclick="bulkDelete()">Delete Selected</button>
                    <input type="file" id="csvUpload" accept=".csv" style="display:none" onchange="handleFileUpload(this)">
                    <button onclick="document.getElementById('csvUpload').click()" style="width: auto;" class="secondary">Import CSV</button>
                    <button onclick="openAddModal()" style="width: auto;">+ Add New Prompt</button>
                </div>
            </div>

            <div class="filters" style="display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div style="display:flex; gap:12px; align-items: center;">
                    <input type="text" id="search" placeholder="Search prompts..." style="width: 200px;">
                    <select id="dimFilter" style="width: 150px;">
                        <option value="">All Dimensions</option>
                    </select>
                    <select id="sourceFilter" style="width: 120px;">
                        <option value="">All Sources</option>
                        <option value="custom">Custom Only</option>
                        <option value="system">System Only</option>
                    </select>
                    <div style="display:flex; gap:8px; align-items:center; border-left: 1px solid var(--border); padding-left: 12px;">
                        <label style="font-size:12px; color:var(--muted)">Date:</label>
                        <input type="date" id="fromDate" style="width: 130px; color-scheme: dark;" title="From Date">
                        <span style="color:var(--muted)">-</span>
                        <input type="date" id="toDate" style="width: 130px; color-scheme: dark;" title="To Date">
                    </div>
                </div>
                <div style="display:flex; gap:12px; align-items:center;">
                    <label style="font-size:12px; color:var(--muted)">Rows per page:</label>
                    <input type="number" id="rowsPerPage" value="100" min="1" style="width: 80px;"
                        onchange="updateRowsPerPage()">
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table style="table-layout: fixed; width: 100%;">
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                            <th style="width: 60px;">#</th>
                            <th style="width: 150px; resize: horizontal; overflow: hidden;">Created At</th>
                            <th style="width: 150px; resize: horizontal; overflow: hidden;">Dimension</th>
                            <th style="resize: horizontal; overflow: hidden;">Prompt Text</th>
                            <th style="width: 80px; resize: horizontal; overflow: hidden;">Lang</th>
                            <th style="width: 100px; resize: horizontal; overflow: hidden;">Source</th>
                            <th style="width: 100px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="promptTable">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>

            <div
                style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:20px; border-top:1px solid var(--border);">
                <div style="color:var(--muted); font-size:14px;" id="pageInfo">
                    Showing 0-0 of 0
                </div>
                <div id="paginationContainer" style="display:flex; gap:8px;">
                    <!-- Pagination will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="addModal" class="modal">
        <div class="card" style="width: 500px; margin: 0;">
            <h3>Add Custom Prompt</h3>
            <div style="display:grid;gap:12px;">
                <div>
                    <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px;">Dimension</label>
                    <input type="text" id="newDimension" placeholder="e.g. Culture, Ethics..." style="width:100%">
                </div>
                <div>
                    <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px;">Prompt
                        Text</label>
                    <textarea id="newText" rows="4" placeholder="Enter prompt text..."
                        style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:#0e0e14;color:var(--text);"></textarea>
                </div>
                <div>
                    <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px;">Language</label>
                    <input type="text" id="newLanguage" value="en" style="width:100%">
                </div>
                <div style="display:flex;gap:8px;margin-top:8px;">
                    <button onclick="submitNewPrompt()">Save Prompt</button>
                    <button class="secondary" onclick="closeAddModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="card" style="width: 500px; margin: 0;">
            <h3>Edit Prompt</h3>
            <div style="display:grid;gap:12px;">
                <div>
                    <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px;">Dimension</label>
                    <input type="text" id="editDimension" placeholder="e.g. Culture, Ethics..." style="width:100%">
                </div>
                <div>
                    <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px;">Prompt
                        Text</label>
                    <textarea id="editText" rows="4" placeholder="Enter prompt text..."
                        style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:#0e0e14;color:var(--text);"></textarea>
                </div>
                <div>
                    <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:4px;">Language</label>
                    <input type="text" id="editLanguage" value="en" style="width:100%">
                </div>
                <div style="display:flex;gap:8px;margin-top:8px;">
                    <button onclick="submitEditPrompt()">Save Changes</button>
                    <button class="secondary" onclick="closeEditModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="modal">
        <div class="card" style="width: 400px; margin: 0;">
            <h3 style="color:var(--danger)">Confirm Deletion</h3>
            <p>Are you sure you want to delete this prompt? This action cannot be undone.</p>
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button class="danger" id="confirmDeleteBtn">Delete</button>
                <button class="secondary" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Import Result Modal -->
    <div id="importModal" class="modal">
        <div class="card" style="width: 500px; margin: 0;">
            <h3>Import Result</h3>
            <p id="importMessage"></p>
            <div id="importErrors" style="margin-top: 12px; max-height: 150px; overflow-y: auto; background: #0e0e14; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; display: none;">
            </div>
            <div style="display:flex;justify-content:flex-end;margin-top:16px;">
                <button onclick="closeImportModal()">OK</button>
            </div>
        </div>
    </div>

    <script src="/static/nav.js"></script>
    <script>renderNavbar('data_studio');</script>
    <script src="/static/datastudio.js"></script>
</body>

</html>
