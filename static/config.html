<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orwell - Configuration</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 53px); /* Subtract header height approx */
            overflow: hidden;
        }

        .config-sidebar {
            background: #0d0d13;
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .config-main {
            padding: 32px 48px;
            overflow-y: auto;
            background: var(--bg);
            scroll-behavior: smooth;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            color: var(--muted);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--card);
            color: var(--text);
        }

        .nav-item.active {
            background: rgba(31, 111, 235, 0.1);
            color: var(--primary);
        }

        .config-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 48px;
            scroll-margin-top: 32px;
        }

        .config-group-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            margin: 0 0 8px 0;
        }

        .config-group-desc {
            color: var(--muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }

        .config-item {
            margin-bottom: 32px;
        }

        .config-label {
            display: block;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .config-desc {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .config-input, .config-textarea {
            width: 100%;
            background: #0b0b0f;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            transition: border-color 0.2s;
        }

        .config-hint {
            font-size: 0.8rem;
            color: var(--primary);
            margin-bottom: 8px;
            background: rgba(31, 111, 235, 0.1);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(31, 111, 235, 0.2);
        }
        
        .config-hint code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        .config-section-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        .config-section-grid .config-group-title,
        .config-section-grid .config-group-desc {
            grid-column: 1 / -1;
        }
        
        .config-item {
            margin-bottom: 32px;
        }
        
        .config-item.config-item-compact {
            margin-bottom: 0;
            background: var(--bg);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        /* Ensure full width for long text items even inside grid */
        .config-item:not(.config-item-compact) {
            grid-column: 1 / -1;
        }

        .config-input:focus, .config-textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        .config-textarea {
            min-height: 200px;
            resize: vertical;
        }

        .action-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 16px;
            gap: 12px;
        }

        .save-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: opacity 0.2s;
            width: auto; /* Override global button width */
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        .save-btn:disabled {
            background: var(--border);
            color: var(--muted);
            cursor: not-allowed;
        }

        .save-status {
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        /* Section Header in Sidebar */
        .sidebar-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 700;
            margin: 24px 0 8px 12px;
            letter-spacing: 0.05em;
        }
        .sidebar-header:first-child {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <header></header>
    
    <div class="app-layout">
        <aside class="config-sidebar" id="sidebar-nav">
            <!-- Sidebar items injected by JS -->
            <div style="padding: 12px; color: var(--muted);">Loading...</div>
        </aside>

        <main class="config-main" id="config-container">
            <!-- Content injected by JS -->
        </main>
    </div>

    <script src="/static/auth.js"></script>
    <script src="/static/nav.js"></script>
    <script src="/static/config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar('config');
        });
    </script>
</body>
</html>
